<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3B82F6"/>
      <stop offset="100%" style="stop-color:#1E40AF"/>
    </linearGradient>
    <linearGradient id="wave" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#FCD34D"/>
      <stop offset="50%" style="stop-color:#F59E0B"/>
      <stop offset="100%" style="stop-color:#EF4444"/>
    </linearGradient>
  </defs>
  <!-- Background circle -->
  <circle cx="32" cy="32" r="30" fill="url(#bg)"/>
  <!-- Seismic wave lines -->
  <path d="M8 32 L16 32 L20 22 L24 42 L28 18 L32 46 L36 20 L40 40 L44 24 L48 32 L56 32" 
        stroke="url(#wave)" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Inner glow effect -->
  <circle cx="32" cy="32" r="28" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="2"/>
  <!-- Small dot indicator -->
  <circle cx="32" cy="32" r="4" fill="#EF4444">
    <animate attributeName="r" values="3;5;3" dur="1s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="1;0.6;1" dur="1s" repeatCount="indefinite"/>
  </circle>
</svg>
